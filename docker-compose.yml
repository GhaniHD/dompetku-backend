services:
  app:
    build: .
    container_name: app_dompetku
    restart: always
    ports:
      - "8090:8090"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=require
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_PORT=8090
   